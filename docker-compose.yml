services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: creditos
      POSTGRES_PASSWORD: creditos_secret
      POSTGRES_DB: creditos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: creditos
      DB_PASSWORD: creditos_secret
      DB_NAME: creditos
      SERVER_PORT: "8080"
      GIN_MODE: release
      JWT_SECRET: docker-dev-secret
      LOCAL_STORAGE_PATH: /app/storage
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_storage:

name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: prestia
  REGION: us-central1
  SERVICE_NAME: prestia-app
  REPOSITORY: docker-repo
  IMAGE: us-central1-docker.pkg.dev/prestia/docker-repo/prestia-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest -f Dockerfile.cloud .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --add-cloudsql-instances=prestia:us-central1:prestia-db
            --set-env-vars=GIN_MODE=release,SERVER_PORT=8080,FRONTEND_DIR=/app/public,FIREBASE_CREDENTIALS_FILE=/secrets/firebase-credentials.json
            --set-secrets=DB_HOST=DB_HOST:latest,DB_PORT=DB_PORT:latest,DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,DB_NAME=DB_NAME:latest,DB_SSLMODE=DB_SSLMODE:latest,DB_INSTANCE=DB_INSTANCE:latest,JWT_SECRET=JWT_SECRET:latest,/secrets/firebase-credentials.json=FIREBASE_CREDENTIALS:latest
